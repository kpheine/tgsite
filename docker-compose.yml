services:
  app-permissions:
    image: alpine:3.20
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    command: sh -c "mkdir -p /app/data /app/uploads/images /app/uploads/videos && chown -R 1000:1000 /app/data /app/uploads"
    restart: "no"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    depends_on:
      app-permissions:
        condition: service_completed_successfully
    expose:
      - "4321"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 4321
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
