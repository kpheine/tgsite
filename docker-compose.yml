services:
  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    env_file:
      - .env
    depends_on:
      - app
    restart: unless-stopped

  app:
    build: .
    expose:
      - "4321"
    volumes:
      - ./data:/app/data
      - ./uploads:/app/uploads
    env_file:
      - .env
    environment:
      HOST: 0.0.0.0
      PORT: 4321
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
